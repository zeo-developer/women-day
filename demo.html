<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng Quốc tế Phụ nữ 8/3 - Bó Hoa Yêu Thương</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            height: 200vh;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 2;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px; /* Thêm padding cho mobile */
            box-sizing: border-box;
        }

        /* --- STYLE CHO MÀN HÌNH 2 (BÓ HOA) --- */
        #bouquet-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column; /* Chồng chữ lên hoa dễ hơn */
            justify-content: center;
            align-items: center;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
        }

        .real-bouquet {
            max-width: 90%; /* Tăng độ rộng cho mobile */
            max-height: 60vh; /* Giới hạn chiều cao để nhường chỗ cho chữ */
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.5));
            transform: scale(0.8);
        }

        .wish-text {
            font-family: 'Georgia', serif;
            color: #ff2d55;
            text-shadow: 0 0 20px rgba(255, 45, 85, 0.8);
            opacity: 0;
            z-index: 10;
            font-style: italic;
            margin-top: 20px;
            text-align: center;
            line-height: 1.2;
            /* Responsive Font Size */
            font-size: clamp(2.5rem, 8vw, 5.5rem); 
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            opacity: 0.5;
            text-transform: uppercase;
            animation: bounce_hint 2s infinite;
        }

        @keyframes bounce_hint {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Tối ưu riêng cho màn hình nhỏ (Mobile) */
        @media (max-width: 600px) {
            .real-bouquet {
                max-height: 50vh;
            }
            .wish-text {
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>
    
    <div id="bouquet-container">
        <img src="1.png" alt="Bó hoa hồng đỏ" class="real-bouquet" id="bouquetImg">
        <h2 class="wish-text" id="wishingText">Happy Women's Day</h2>
    </div>

    <div class="main-content">
        <section class="screen-1">
            <div class="scroll-hint">Cuộn xuống để nhận quà</div>
        </section>
        <section class="screen-2">
            </section>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        const isMobile = window.innerWidth < 600;
        const particleCount = isMobile ? 500 : 1000; // Giảm hạt trên mobile để mượt hơn

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // Nếu resize thủ công, cần tính toán lại tọa độ đích của hạt
            updateParticleTargets();
        }

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            // Scale trái tim nhỏ hơn trên Mobile
            const baseScale = Math.min(width, height) / (isMobile ? 55 : 45); 
            return { x: x * baseScale, y: y * baseScale };
        }

        class Particle {
            constructor(id) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.id = id;
                this.updateTarget();
                
                this.size = Math.random() * (isMobile ? 2 : 3) + 0.5;
                this.color = `rgba(255, ${Math.random() * 120 + 80}, ${Math.random() * 100 + 150}, ${Math.random() * 0.7 + 0.3})`;
                this.speedY = Math.random() * 0.4 + 0.1;
                this.opacity = 1;
            }
            updateTarget() {
                const t = (this.id / particleCount) * Math.PI * 2;
                const pos = getHeartPoint(t);
                this.targetX = width / 2 + pos.x;
                this.targetY = height / 2 + pos.y;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.y += this.speedY;
                if (this.y > height) this.y = -10;
            }
        }

        function updateParticleTargets() {
            particles.forEach(p => p.updateTarget());
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                const p = new Particle(i);
                particles.push(p);
                gsap.to(p, {
                    x: p.targetX,
                    y: p.targetY,
                    duration: 2.5,
                    ease: "expo.out",
                    delay: Math.random() * 1.5
                });
            }
        }

        function render() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        render();

        // --- SCROLL ANIMATION ---
        const mainTimeline = gsap.timeline({
            scrollTrigger: {
                trigger: ".screen-2",
                start: "top bottom",
                end: "top top",
                scrub: 1.5,
            }
        });

        // Hạt tan rã
        particles.forEach(p => {
            mainTimeline.to(p, {
                opacity: 0,
                x: p.x + (Math.random() - 0.5) * (isMobile ? 200 : 400),
                y: p.y + (Math.random() - 0.5) * (isMobile ? 200 : 400),
                duration: 1
            }, 0);
        });

        // Hiện bó hoa và chữ
        mainTimeline.to("#bouquet-container", { opacity: 1, duration: 0.5 }, 0.2);
        mainTimeline.to("#bouquetImg", { scale: 1, duration: 1, ease: "back.out(1.2)" }, 0.3);
        mainTimeline.to("#wishingText", {
            opacity: 1,
            y: 0,
            duration: 1,
            ease: "power2.out"
        }, 0.6);

    </script>
</body>
</html>
